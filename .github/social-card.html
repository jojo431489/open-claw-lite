<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; }
.card {
  width: 1280px; height: 640px;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
  position: relative; overflow: hidden;
  display: flex; align-items: center; padding: 0 80px;
}
.bg-grid { position: absolute; inset: 0; opacity: 0.04;
  background-image: linear-gradient(white 1px, transparent 1px), linear-gradient(90deg, white 1px, transparent 1px);
  background-size: 40px 40px;
}
.glow1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(99,102,241,0.3) 0%, transparent 70%); top: -150px; right: -100px; }
.glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(244,114,182,0.2) 0%, transparent 70%); bottom: -100px; left: -100px; }

.left { position: relative; z-index: 2; flex: 1; }
.lobster { font-size: 110px; margin-bottom: 16px; filter: drop-shadow(0 4px 12px rgba(244,114,182,0.4)); }
.title { font-size: 76px; font-weight: 900; color: white; line-height: 1; margin-bottom: 12px; letter-spacing: -2px; }
.title .lite { background: linear-gradient(135deg, #818cf8, #f472b6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.tagline { font-size: 24px; color: #94a3b8; margin-bottom: 32px; }
.features { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 32px; max-width: 700px; }
.tag { background: rgba(99,102,241,0.15); color: #a5b4fc; font-size: 16px; padding: 8px 16px; border-radius: 100px; border: 1px solid rgba(99,102,241,0.3); }
.cta { display: inline-flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); color: #cbd5e1; font-size: 18px; padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-family: monospace; }

.right { position: relative; z-index: 2; }
.terminal { width: 380px; background: rgba(0,0,0,0.5); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
.term-header { padding: 12px 16px; background: rgba(255,255,255,0.03); display: flex; gap: 8px; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.r { background: #ef4444; } .y { background: #f59e0b; } .g { background: #10b981; }
.term-title { color: #64748b; font-size: 13px; margin-left: 12px; font-family: monospace; }
.term-body { padding: 20px; font-family: 'Monaco', monospace; font-size: 14px; line-height: 1.7; color: #e2e8f0; }
.prompt { color: #22c55e; }
.cmd { color: #f1f5f9; }
.out { color: #94a3b8; }
.cursor { display: inline-block; width: 8px; height: 16px; background: #22c55e; vertical-align: middle; }

.platforms { position: absolute; bottom: 40px; right: 80px; display: flex; gap: 16px; z-index: 2; }
.platform { background: rgba(255,255,255,0.08); padding: 10px 16px; border-radius: 8px; color: #cbd5e1; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }

.bottom-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #6366f1, #f472b6, #fb7185, #6366f1); }
</style></head>
<body><div class="card">
<div class="bg-grid"></div>
<div class="glow1"></div>
<div class="glow2"></div>

<div class="left">
  <div class="lobster">🦞</div>
  <div class="title">OpenClaw <span class="lite">Lite</span></div>
  <div class="tagline">本地優先的開源 AI 助理框架</div>
  <div class="features">
    <span class="tag">🤖 多模型 LLM</span>
    <span class="tag">📱 LINE / Telegram / Discord</span>
    <span class="tag">🧠 持久記憶</span>
    <span class="tag">🔌 技能插件</span>
    <span class="tag">🔧 ReAct Agent</span>
    <span class="tag">🏠 本地優先</span>
    <span class="tag">🐳 Docker</span>
  </div>
  <div class="cta">$ git clone github.com/jojo431489/open-claw-lite</div>
</div>

<div class="right">
  <div class="terminal">
    <div class="term-header">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <div class="term-title">openclaw-lite</div>
    </div>
    <div class="term-body">
      <div><span class="prompt">$</span> <span class="cmd">npm run onboard</span></div>
      <div class="out">✓ 設定 LLM 供應商</div>
      <div class="out">✓ 連接 Telegram Bot</div>
      <div class="out">✓ 啟用記憶系統</div>
      <div class="out">✓ 載入 4 個技能</div>
      <div><span class="prompt">$</span> <span class="cmd">npm run dev</span></div>
      <div class="out">🦞 助理已上線！</div>
      <div><span class="prompt">$</span> <span class="cursor"></span></div>
    </div>
  </div>
</div>

<div class="bottom-bar"></div>
</div></body></html>
